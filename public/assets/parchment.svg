<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <!--
    Aged parchment tile (Task 4 — hand-built texture, no binary asset).
    Layers: warm cream base + fractal-noise mottling + fine fibre grain +
    a few darker age stains. stitchTiles="stitch" so it repeats seamlessly.
  -->
  <defs>
    <filter id="mottle" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="11" stitchTiles="stitch" result="t"/>
      <feColorMatrix in="t" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.40
                0 0 0 0 0.20
                0 0 0 0.55 0"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="2" seed="5" stitchTiles="stitch" result="g"/>
      <feColorMatrix in="g" type="matrix"
        values="0 0 0 0 0.30
                0 0 0 0 0.22
                0 0 0 0 0.10
                0 0 0 0.13 0"/>
    </filter>
  </defs>

  <rect width="280" height="280" fill="#e7d3a6"/>
  <rect width="280" height="280" filter="url(#mottle)"/>
  <rect width="280" height="280" filter="url(#grain)"/>

  <!-- scattered darker age stains -->
  <g fill="#6b4a22">
    <ellipse cx="58"  cy="70"  rx="42" ry="26" opacity="0.10"/>
    <ellipse cx="222" cy="176" rx="50" ry="32" opacity="0.09"/>
    <ellipse cx="150" cy="252" rx="38" ry="22" opacity="0.10"/>
    <ellipse cx="246" cy="44"  rx="26" ry="18" opacity="0.08"/>
    <ellipse cx="30"  cy="210" rx="30" ry="20" opacity="0.08"/>
  </g>
</svg>
